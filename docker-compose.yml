services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: archaeologist
      POSTGRES_PASSWORD: archaeologist
      POSTGRES_DB: session_archaeologist
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U archaeologist -d session_archaeologist"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://archaeologist:archaeologist@postgres:5432/session_archaeologist
      REDIS_URL: redis://redis:6379/0
    volumes:
      - vectordb:/app/data/vectordb
      - output:/app/output
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
  redisdata:
  vectordb:
  output:
